name: Build ZMK firmware

on:
  push:
    paths-ignore:
      - 'assets/**'
      - 'scripts/niceview_lvgl_convert.py'
      - '.github/workflows/**'
      - '*.md'
  pull_request:
    paths-ignore:
      - 'assets/**'
      - 'scripts/niceview_lvgl_convert.py'
      - '.github/workflows/**'
      - '*.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-

      - name: Install West
        run: pip3 install west==1.2.0

      - name: Install Zephyr SDK
        run: |
          wget https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.16.1/zephyr-sdk-0.16.1_linux-x86_64.tar.xz
          tar xvf zephyr-sdk-0.16.1_linux-x86_64.tar.xz
          cd zephyr-sdk-0.16.1 && ./setup.sh -t arm-zephyr-eabi -c

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update

      - name: West Zephyr export
        run: west zephyr-export

      - name: Build Corne Left
        run: |
          export ZEPHYR_SDK_INSTALL_DIR=$(pwd)/zephyr-sdk-0.16.1
          west build -s zmk/app -b nice_nano_v2 -- -DSHIELD=corne_left -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Build Corne Right
        run: |
          export ZEPHYR_SDK_INSTALL_DIR=$(pwd)/zephyr-sdk-0.16.1
          west build -s zmk/app -b nice_nano_v2 -- -DSHIELD=corne_right -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Archive firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            build/zephyr/zmk.uf2
